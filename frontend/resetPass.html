<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <style>
        :root{
            --purple-1: #6c4bf0;
            --purple-2: #8a6ffb;
            --bg: #efe9ff;
        }
        *{box-sizing:border-box}
        body{margin:0;font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;background:#f8f9fa;display:flex;align-items:center;justify-content:center;height:100vh;position:relative;overflow:hidden}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:url('../css/evsu_background.png');background-size:cover;background-position:center;background-attachment:fixed;filter:blur(4px);z-index:-1}

        .wrap{width:900px;max-width:95%;padding:20px 0;}
        .card{display:flex;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 15px 30px rgba(40,20,100,0.08)}

        .left, .right{flex:1;min-height:480px}
        @media (max-width:860px){
            .card{flex-direction:column}
            .left,.right{min-height:auto}
        }

        .left{padding:60px 48px;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#fff;flex:0 0 40%;position:relative;}
        .right{flex:1;}    
        .portal-title{font-size:44px;font-weight:900;color:#d32f2f;margin:0 0 32px 0;letter-spacing:-1px;white-space:nowrap}
        .signin-label{font-size:16px;color:#1a1a1a;font-weight:600;margin-bottom:20px}    

        form{max-width:400px;width:100%;padding:0 16px;display:flex;flex-direction:column;align-items:center;margin-top:32px}
        .field{margin-bottom:24px;width:100%}
        label{display:none}
        input, select{width:100%;padding:16px 18px;border-radius:6px;border:2px solid #8B0000;background:rgba(255,255,255,0.1);font-size:16px;color:#fff;font-weight:500;transition:all 0.2s;align-self:stretch}
        input:focus, select:focus{outline:none;border-color:#ffdede;background:rgba(255,255,255,0.2)}
        input::placeholder, select::placeholder{color:#ffdede}
        button{margin:10px auto 0 auto;background:#ffdede;color:#8B0000;padding:14px 16px;border-radius:6px;border:0;width:50%;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s}
        button:hover{background:#fff}
        .msg{margin-top:8px;font-size:13px;padding:10px;border-radius:4px;display:none}
        .msg.show{display:block}
        .msg.error{background:#fed7d7;color:#c53030}
        .msg.success{background:#c6f6d5;color:#22543d}
        .links{display:flex;justify-content:space-between;align-items:center;margin:16px 0 24px 0;font-size:14px;width:100%;align-self:stretch}
        .links a{color:#d32f2f;text-decoration:none;font-weight:500}
        .links a:hover{text-decoration:underline}
        .footer{font-size:12px;color:#666;line-height:1.7;padding-top:24px;border-top:1px solid #e0e0e0}
        .footer a{color:#d32f2f;text-decoration:none;font-weight:600}

        .right{background:linear-gradient(135deg,#6B0000,#8B0000);color:#fff;padding:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}    
        .visual-card{width:240px;height:240px;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(255,255,255,0.1);border-radius:12px;border:2px solid rgba(255,255,255,0.2);position:relative}
        .visual-card::before{content:'';position:absolute;top:-20px;left:-20px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.15)}
        .visual-card::after{content:'';position:absolute;bottom:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.1)}
        .logo-placeholder{display:none}

        .circle-1{position:absolute;left:-60px;top:20px;width:180px;height:180px;background:rgba(107,0,0,0.15);border-radius:50%}
        .circle-2{position:absolute;right:-60px;bottom:20px;width:140px;height:140px;background:rgba(107,0,0,0.10);border-radius:50%}

        .left .circle-1-left{position:absolute;top:-60px;left:-60px;width:200px;height:200px;background:rgba(107,0,0,0.15);border-radius:50%}
        .left .circle-2-left{position:absolute;bottom:-50px;right:-50px;width:140px;height:140px;background:rgba(107,0,0,0.12);border-radius:50%}

        @media (max-width:860px){
            .card{flex-direction:column}
            .right{padding:28px}
            .visual-card{width:80%;height:220px}
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="left">
                <div class="circle-1-left"></div>
                <div class="circle-2-left"></div>
                <div class="visual-card">
                    <img src="/css/EVSU_Official_Logo.png" alt="EVSU logo" style="max-width:180px;max-height:180px;object-fit:contain;display:block;margin:auto;background:transparent;border:0" />
                </div>
            </div>
            <div class="right" aria-hidden="true">
                <h1 class="portal-title" style="color:#fff;align-self:center;">Forgot Password</h1>
                

                <form id="resetPassForm">
                    <div class="field">
                        <label for="password">New Password</label>
                        <input id="password" name="password" type="password" placeholder="Enter your new password" required />
                    </div>
                    <div class="field">
                        <label for="confirmPassword">Confirm Password</label>
                        <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm your new password" required />
                    </div>
                    <button type="submit">Reset Password</button>
                    <div id="message" class="msg" role="status" aria-live="polite"></div>
                </form>
                
                <br>
                <div class="footer" style="color:#eee">
                    By using this service, you understood and agree to the
                    <a href="#terms" style="color:#ffdede">EVSU Online Services Terms of Use and Privacy Statement</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('signInForm');
        const msg = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.classList.remove('show', 'error', 'success');
            msg.textContent = '';

            const studentId = document.getElementById('studentId').value.trim();
            const password = document.getElementById('password').value;

            if (!studentId || !password) {
                msg.classList.add('show', 'error');
                msg.textContent = '✗ Please fill in all fields.';
                return;
            }

            try {
                const res = await fetch('../api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: studentId, password, role: 'student' })
                });
                const data = await res.json();

                if (data.success) {
                    msg.classList.add('show', 'success');
                    msg.textContent = '✓ Signed in successfully. Redirecting...';
                    setTimeout(() => {
                        window.location.href = '../student_dashboard.html';
                    }, 700);
                } else {
                    msg.classList.add('show', 'error');
                    msg.textContent = '✗ ' + (data.message || 'Invalid student ID or password.');
                }
            } catch (err) {
                msg.classList.add('show', 'error');
                msg.textContent = '✗ Network or server error.';
            }
        });
    </script>
</body>
</html>
